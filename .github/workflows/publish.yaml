name: Publish

on:
  workflow_run:
    workflows: ["Build"]
    types: [completed]

permissions:
  id-token: write
  contents: read

jobs:
  publish-node:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm
        run: npm install -g npm@11.6.2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3
      - name: Install deps
        run: |
          bun --version
          bun install --frozen-lockfile

      - name: Extract version
        id: versions
        uses: ./.github/actions/extract-version
        with:
          version: ${{ github.event.workflow_run.head_branch }}

      - name: "Build packages"
        run: bun run ts:build && bun run --filter '!playground' build

      - name: "Publish NPM"
        run: bash ./scripts/npm-publish/run.sh
        env:
          NPM_TAG: ${{ steps.versions.outputs.npmTag }}

      - name: "Dump npm logs on failure"
        if: failure()
        run: |
          echo "=== NPM Debug Logs ==="
          find /home/runner/.npm/_logs -name "*.log" -type f -exec echo "=== {} ===" \; -exec cat {} \;
